<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 sidebar">

                <h3>Dashboard</h3>

                <a href="#">Home</a>
                <a href="#">Students</a>
                <a href="#">Courses</a>
                <a href="#">Results</a>
                <a href="#">Logout</a>

            </div>

            <!-- Main Content -->

            <div class="col-md-10 main">

                <h2>College Admin Dashboard</h2>

                <div class="row mt-4">

                    <div class="col-md-3">
                        <div class="card-box bg-primary">
                            <h3>500</h3>
                            <p>Students</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card-box bg-success">
                            <h3>50</h3>
                            <p>Teachers</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card-box bg-warning">
                            <h3>20</h3>
                            <p>Courses</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card-box bg-danger">
                            <h3>95%</h3>
                            <p>Results</p>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

      <footer class="bg-dark text-white text-center py-3 mt-4">
        <p class="mb-0">© 2026 College Admin Dashboard | All Rights Reserved</p>
    </footer>

</body>
</html>
